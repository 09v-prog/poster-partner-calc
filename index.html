<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Партнерский калькулятор — Poster POS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --poster-green: #3cc653;
    --poster-green-hover: #34b249;
    --poster-green-light: #e8f8eb;
    --poster-green-bg: #f2fbf4;
    --poster-dark: #212529;
    --poster-dark-soft: #343a40;
    --text-primary: #212529;
    --text-secondary: #6c757d;
    --text-muted: #adb5bd;
    --border: #dee2e6;
    --bg-page: #ffffff;
    --bg-section: #f8f9fa;
    --bg-card: #ffffff;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.1);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--text-primary);
    background: var(--bg-page);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ===== NAVBAR ===== */
  .navbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  .navbar-inner {
    max-width: 1120px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }
  .navbar-logo {
    display: flex;
    align-items: center;
    gap: 0;
    text-decoration: none;
    color: var(--text-primary);
  }
  .navbar-logo img, .navbar-logo svg { height: 28px; width: auto; }
  .lang-switch {
    display: flex;
    background: var(--bg-section);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
    border: 1px solid var(--border);
  }
  .lang-btn {
    padding: 6px 14px;
    border: none;
    background: transparent;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text-secondary);
    font-family: inherit;
    transition: all 0.2s;
  }
  .lang-btn.active {
    background: var(--bg-card);
    color: var(--text-primary);
    box-shadow: var(--shadow-sm);
  }
  .lang-btn:hover:not(.active) { color: var(--text-primary); }

  /* ===== HERO ===== */
  .hero {
    background: var(--poster-dark);
    color: white;
    padding: 72px 24px 96px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 20% 80%, rgba(60,198,83,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 500px 350px at 80% 20%, rgba(60,198,83,0.08) 0%, transparent 70%);
  }
  .hero > * { position: relative; z-index: 1; }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(60,198,83,0.15);
    border: 1px solid rgba(60,198,83,0.3);
    color: #5ed970;
    padding: 6px 16px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.8px;
    margin-bottom: 28px;
    text-transform: uppercase;
  }
  .hero h1 {
    font-size: clamp(34px, 5vw, 52px);
    font-weight: 900;
    line-height: 1.08;
    margin-bottom: 16px;
    letter-spacing: -1.5px;
  }
  .hero h1 span {
    color: #5ed970;
  }
  .hero p {
    font-size: 17px;
    color: rgba(255,255,255,0.6);
    max-width: 520px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* ===== CONTAINER ===== */
  .container {
    max-width: 1120px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ===== CALCULATOR ===== */
  .calc-section {
    margin-top: -56px;
    position: relative;
    z-index: 2;
    padding-bottom: 64px;
  }
  .calc-card {
    background: var(--bg-card);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .calc-header {
    background: var(--poster-green);
    color: white;
    padding: 20px 32px;
    font-size: 17px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .calc-body {
    padding: 36px 32px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 44px;
  }
  @media (max-width: 768px) {
    .calc-body { grid-template-columns: 1fr; gap: 28px; padding: 24px 20px; }
  }

  /* Form Controls */
  .form-group { margin-bottom: 24px; }
  .form-group:last-child { margin-bottom: 0; }
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 10px;
  }

  .plan-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .plan-option { position: relative; cursor: pointer; }
  .plan-option input { display: none; }
  .plan-option label {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 8px;
    border: 2px solid var(--border);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    background: var(--bg-card);
  }
  .plan-option label:hover {
    border-color: var(--poster-green);
    background: var(--poster-green-bg);
  }
  .plan-option input:checked + label {
    border-color: var(--poster-green);
    background: var(--poster-green-light);
  }
  .plan-name { font-weight: 700; font-size: 15px; color: var(--text-primary); margin-bottom: 1px; }
  .plan-price { font-size: 12px; color: var(--text-muted); }
  .plan-popular {
    position: absolute;
    top: -7px; right: -4px;
    background: var(--poster-green);
    color: white;
    font-size: 9px;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  /* Toggle buttons */
  .toggle-group {
    display: flex;
    background: var(--bg-section);
    border-radius: var(--radius-sm);
    padding: 3px;
    gap: 3px;
    border: 1px solid var(--border);
  }
  .toggle-btn {
    flex: 1;
    padding: 10px 14px;
    border: none;
    background: transparent;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-secondary);
    font-family: inherit;
    white-space: nowrap;
  }
  .toggle-btn.active {
    background: var(--bg-card);
    color: var(--text-primary);
    box-shadow: var(--shadow-sm);
  }
  .toggle-btn:hover:not(.active) { color: var(--text-primary); }
  .toggle-badge {
    display: inline-block;
    background: #fef3c7;
    color: #92400e;
    font-size: 9px;
    font-weight: 800;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 4px;
    vertical-align: middle;
    text-transform: uppercase;
  }

  /* Slider */
  .slider-container { position: relative; }
  .slider-value {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .slider-number { font-size: 38px; font-weight: 900; color: var(--poster-green); line-height: 1; }
  .slider-unit { font-size: 13px; color: var(--text-muted); font-weight: 500; }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px; height: 24px;
    background: var(--poster-green);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(60,198,83,0.35);
    transition: transform 0.1s;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.12); }
  input[type="range"]::-moz-range-thumb {
    width: 24px; height: 24px;
    background: var(--poster-green);
    border-radius: 50%;
    cursor: pointer;
    border: none;
    box-shadow: 0 2px 8px rgba(60,198,83,0.35);
  }

  /* Results Panel */
  .results-panel { display: flex; flex-direction: column; justify-content: center; }
  .result-main {
    background: var(--poster-dark);
    border-radius: var(--radius-lg);
    padding: 28px;
    color: white;
    margin-bottom: 16px;
  }
  .result-label {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .result-amount {
    font-size: clamp(34px, 5vw, 48px);
    font-weight: 900;
    color: #5ed970;
    line-height: 1.1;
    margin-bottom: 2px;
    letter-spacing: -1px;
  }
  .result-currency { font-size: 15px; color: rgba(255,255,255,0.5); font-weight: 500; }
  .result-sub {
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .result-sub-label {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 700;
    margin-bottom: 3px;
  }
  .result-sub-value { font-size: 20px; font-weight: 800; color: white; }

  .breakdown-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .breakdown-card {
    background: var(--bg-section);
    border-radius: var(--radius-sm);
    padding: 14px;
    border: 1px solid var(--border);
  }
  .breakdown-card-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 700;
    margin-bottom: 3px;
  }
  .breakdown-card-value { font-size: 16px; font-weight: 800; color: var(--text-primary); }

  /* ===== SECTIONS ===== */
  .section-title { text-align: center; margin-bottom: 44px; }
  .section-title h2 {
    font-size: 28px;
    font-weight: 900;
    color: var(--text-primary);
    margin-bottom: 6px;
    letter-spacing: -0.8px;
  }
  .section-title p { font-size: 15px; color: var(--text-secondary); }

  /* Advantages */
  .advantages-section { padding: 64px 24px; background: var(--bg-section); }
  .advantages-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  @media (max-width: 768px) { .advantages-grid { grid-template-columns: 1fr; } }
  .advantage-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    padding: 28px;
    transition: box-shadow 0.2s;
  }
  .advantage-card:hover { box-shadow: var(--shadow-md); }
  .advantage-icon {
    width: 44px; height: 44px;
    background: var(--poster-green-light);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
  }
  .advantage-icon svg { width: 22px; height: 22px; color: var(--poster-green); }
  .advantage-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .advantage-card p { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

  /* Pricing Table */
  .pricing-section { padding: 64px 24px; }
  .pricing-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .pricing-table thead th {
    background: var(--poster-dark);
    color: white;
    padding: 16px 20px;
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .pricing-table thead th:first-child { text-align: left; }
  .pricing-table tbody td {
    padding: 14px 20px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .pricing-table tbody td:first-child { text-align: left; font-weight: 600; color: var(--text-secondary); }
  .pricing-table tbody tr:last-child td { border-bottom: none; }
  .pricing-table tbody tr:hover { background: var(--poster-green-bg); }
  .table-highlight { background: var(--poster-green-bg); }
  .price-cell { font-weight: 700; color: var(--text-primary); }
  .commission-cell { font-weight: 800; color: var(--poster-green); font-size: 15px !important; }
  @media (max-width: 600px) {
    .pricing-table { font-size: 11px; }
    .pricing-table thead th, .pricing-table tbody td { padding: 10px 8px; }
  }

  /* Chart */
  .projection-section { padding: 0 24px 64px; }
  .projection-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    padding: 36px 28px;
  }
  .projection-chart { width: 100%; height: 260px; position: relative; margin-top: 20px; }
  .chart-canvas { width: 100%; height: 100%; }

  /* How It Works */
  .how-section { padding: 64px 24px; background: var(--bg-section); }
  .steps-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  @media (max-width: 768px) { .steps-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 480px) { .steps-grid { grid-template-columns: 1fr; } }
  .step-card {
    text-align: center;
    padding: 28px 18px;
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
  }
  .step-number {
    width: 42px; height: 42px;
    background: var(--poster-green);
    color: white;
    border-radius: var(--radius-sm);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900;
    margin-bottom: 14px;
  }
  .step-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .step-card p { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

  /* FAQ */
  .faq-section { padding: 64px 24px; }
  .faq-list { max-width: 720px; margin: 0 auto; }
  .faq-item {
    background: var(--bg-card);
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    margin-bottom: 10px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .faq-item:hover { box-shadow: var(--shadow-sm); }
  .faq-question {
    padding: 18px 22px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
    transition: background 0.15s;
  }
  .faq-question:hover { background: var(--bg-section); }
  .faq-arrow { transition: transform 0.25s; flex-shrink: 0; margin-left: 14px; color: var(--text-muted); }
  .faq-item.open .faq-arrow { transform: rotate(180deg); }
  .faq-answer { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; }
  .faq-answer-inner { padding: 0 22px 18px; font-size: 14px; color: var(--text-secondary); line-height: 1.7; }

  /* CTA */
  .cta-section { padding: 0 24px 64px; }
  .cta-card {
    background: var(--poster-dark);
    border-radius: var(--radius-xl);
    padding: 56px 36px;
    text-align: center;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .cta-card::before {
    content: '';
    position: absolute;
    top: -50%; right: -30%;
    width: 80%; height: 200%;
    background: radial-gradient(circle, rgba(60,198,83,0.1) 0%, transparent 60%);
  }
  .cta-card > * { position: relative; z-index: 1; }
  .cta-card h2 { font-size: 28px; font-weight: 900; margin-bottom: 10px; letter-spacing: -0.8px; }
  .cta-card p {
    font-size: 15px; color: rgba(255,255,255,0.6);
    margin-bottom: 28px; max-width: 440px; margin-left: auto; margin-right: auto;
  }
  .cta-btn {
    display: inline-block;
    background: var(--poster-green);
    color: white;
    padding: 14px 32px;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s;
    letter-spacing: -0.2px;
  }
  .cta-btn:hover { background: var(--poster-green-hover); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(60,198,83,0.3); }

  /* Footer */
  footer {
    text-align: center;
    padding: 28px 24px;
    color: var(--text-muted);
    font-size: 13px;
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--poster-green); text-decoration: none; font-weight: 600; }
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="https://joinposter.kz" class="navbar-logo" target="_blank">
      <img src="https://joinposter.com/i/site/img/poster-logo-dark.svg" alt="Poster" height="28" onerror="this.onerror=null;this.outerHTML='<svg width=28 height=28 viewBox=&quot;0 0 32 32&quot; fill=&quot;none&quot;><rect width=&quot;32&quot; height=&quot;32&quot; rx=&quot;8&quot; fill=&quot;#3cc653&quot;/><path d=&quot;M9 9h6v6H9zM17 9h6v6h-6zM9 17h6v6H9z&quot; fill=&quot;white&quot;/><circle cx=&quot;20&quot; cy=&quot;20&quot; r=&quot;3&quot; fill=&quot;white&quot;/></svg>'">
    </a>
    <div class="lang-switch">
      <button class="lang-btn active" onclick="setLang('ru')">Рус</button>
      <button class="lang-btn" onclick="setLang('kz')">Қаз</button>
    </div>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-badge" data-i18n="heroBadge"></div>
  <h1 data-i18n-html="heroTitle"></h1>
  <p data-i18n="heroSubtitle"></p>
</section>

<!-- Calculator -->
<section class="calc-section">
  <div class="container">
    <div class="calc-card">
      <div class="calc-header">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="10" y2="18"/><line x1="14" y1="18" x2="16" y2="18"/></svg>
        <span data-i18n="calcTitle"></span>
      </div>
      <div class="calc-body">
        <div>
          <div class="form-group">
            <div class="form-label" data-i18n="labelPlan"></div>
            <div class="plan-grid">
              <div class="plan-option">
                <input type="radio" name="plan" id="starter" value="starter">
                <label for="starter">
                  <span class="plan-name">Starter</span>
                  <span class="plan-price" id="priceStarter"></span>
                </label>
              </div>
              <div class="plan-option">
                <input type="radio" name="plan" id="mini" value="mini">
                <label for="mini">
                  <span class="plan-name">Mini</span>
                  <span class="plan-price" id="priceMini"></span>
                </label>
              </div>
              <div class="plan-option" style="position:relative;">
                <input type="radio" name="plan" id="business" value="business" checked>
                <label for="business">
                  <span class="plan-name">Business</span>
                  <span class="plan-price" id="priceBusiness"></span>
                </label>
                <span class="plan-popular" data-i18n="planHit"></span>
              </div>
              <div class="plan-option">
                <input type="radio" name="plan" id="pro" value="pro">
                <label for="pro">
                  <span class="plan-name">Pro</span>
                  <span class="plan-price" id="pricePro"></span>
                </label>
              </div>
            </div>
          </div>

          <div class="form-group">
            <div class="form-label" data-i18n="labelBilling"></div>
            <div class="toggle-group">
              <button class="toggle-btn active" data-billing="annual" onclick="setBilling('annual')">
                <span data-i18n="billingYear"></span> <span class="toggle-badge" data-i18n="billingBadge"></span>
              </button>
              <button class="toggle-btn" data-billing="monthly" onclick="setBilling('monthly')">
                <span data-i18n="billingMonth"></span>
              </button>
            </div>
          </div>

          <div class="form-group">
            <div class="form-label" data-i18n="labelClients"></div>
            <div class="slider-container">
              <div class="slider-value">
                <span class="slider-number" id="clientCount">5</span>
                <span class="slider-unit" data-i18n="unitClients"></span>
              </div>
              <input type="range" id="clientSlider" min="1" max="50" value="5" oninput="updateCalc()">
            </div>
          </div>

          <div class="form-group">
            <div class="form-label" data-i18n="labelPeriod"></div>
            <div class="toggle-group">
              <button class="toggle-btn" data-period="3" onclick="setPeriod(3)"><span data-i18n="period3"></span></button>

function fmt(n) {
  return Math.round(n).toLocaleString('ru-RU').replace(/\u00A0/g, ' ').replace(/,/g, ' ');
}

function t(key) { return i18n[currentLang][key] || key; }

// ===== LANGUAGE =====
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === (lang === 'ru' ? 'Рус' : 'Қаз'));
  });
  document.documentElement.lang = lang === 'ru' ? 'ru' : 'kk';
  applyTranslations();
  buildFaq();
  updateCalc();
}

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    el.innerHTML = t(el.dataset.i18nHtml);
  });
}

// ===== FAQ =====
function buildFaq() {
  const list = document.getElementById('faqList');
  const faqs = t('faq');
  list.innerHTML = faqs.map(f => `
    <div class="faq-item">
      <div class="faq-question" onclick="toggleFaq(this)">
        <span>${f.q}</span>
        <svg class="faq-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="faq-answer">
        <div class="faq-answer-inner">${f.a}</div>
      </div>
    </div>
  `).join('');
}

function toggleFaq(el) {
  const item = el.parentElement;
  const answer = item.querySelector('.faq-answer');
  if (item.classList.contains('open')) {
    item.classList.remove('open');
    answer.style.maxHeight = '0';
  } else {
    document.querySelectorAll('.faq-item.open').forEach(i => {
      i.classList.remove('open');
      i.querySelector('.faq-answer').style.maxHeight = '0';
    });
    item.classList.add('open');
    answer.style.maxHeight = answer.scrollHeight + 'px';
  }
}

  updateCalc();
}

function setPeriod(months) {
  currentPeriod = months;
  document.querySelectorAll('[data-period]').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.period) === months);
  });
  updateCalc();
}

function updateCalc() {
  const plan = document.querySelector('input[name="plan"]:checked').value;
  const clients = parseInt(document.getElementById('clientSlider').value);
  const price = plans[plan][currentBilling];

  const perClientReward = price * currentPeriod * 0.30;
  const total = perClientReward * clients;
  const perMonthReward = total / currentPeriod;

  document.getElementById('clientCount').textContent = clients;
  document.getElementById('totalReward').textContent = fmt(total);
  document.getElementById('perClient').textContent = fmt(perClientReward) + ' ₸';
  document.getElementById('perMonth').textContent = fmt(perMonthReward) + ' ₸';
  document.getElementById('planPrice').textContent = fmt(price) + ' ₸';
  document.getElementById('periodDisplay').textContent = currentPeriod + t('periodSuffix');

  // Update plan prices
  ['starter','mini','business','pro'].forEach(p => {
    const el = document.getElementById('price' + p.charAt(0).toUpperCase() + p.slice(1));
    if (el) el.textContent = t('pricePrefix') + fmt(plans[p][currentBilling]) + t('priceSuffix');
  });

  // Slider fill
  const slider = document.getElementById('clientSlider');
  const pct = ((clients - 1) / 49) * 100;
  slider.style.background = `linear-gradient(to right, var(--poster-green) 0%, var(--poster-green) ${pct}%, var(--border) ${pct}%, var(--border) 100%)`;

  drawChart();
}

// ===== CHART =====
function drawChart() {
  const canvas = document.getElementById('projectionChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = canvas.offsetHeight * dpr;
  ctx.scale(dpr, dpr);

  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;

  const plan = document.querySelector('input[name="plan"]:checked').value;
  const price = plans[plan][currentBilling];
  const reward = price * currentPeriod * 0.30;

  const months = 12;
  const data = [];
  let cum = 0;
  for (let i = 1; i <= months; i++) { cum += 3 * reward; data.push(cum); }

  const max = data[months - 1];
  const pT = 36, pB = 36, pL = 76, pR = 16;
  const cW = w - pL - pR;
  const cH = h - pT - pB;

  ctx.clearRect(0, 0, w, h);

  // Grid
  ctx.strokeStyle = '#f0f0f0';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pT + (cH / 4) * i;
    ctx.beginPath(); ctx.moveTo(pL, y); ctx.lineTo(w - pR, y); ctx.stroke();
    ctx.fillStyle = '#9ca3af'; ctx.font = '10px Inter, sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(fmt(max - (max / 4) * i) + ' ₸', pL - 8, y + 3);
  }

  // X labels
  const monthLabel = t('chartMonth');
  ctx.textAlign = 'center';
  for (let i = 0; i < months; i++) {
    const x = pL + (cW / (months - 1)) * i;
    ctx.fillStyle = '#9ca3af'; ctx.font = '10px Inter, sans-serif';
    const label = currentLang === 'kz' ? (i + 1) + monthLabel : monthLabel + (i + 1);
    ctx.fillText(label, x, h - 10);
  }

  // Area
  ctx.beginPath();
  ctx.moveTo(pL, pT + cH);
  for (let i = 0; i < months; i++) {
    const x = pL + (cW / (months - 1)) * i;
    const y = pT + cH - (data[i] / max) * cH;
    if (i === 0) ctx.lineTo(x, y);
    else {
      const px = pL + (cW / (months - 1)) * (i - 1);
      const py = pT + cH - (data[i - 1] / max) * cH;
      ctx.bezierCurveTo((px + x) / 2, py, (px + x) / 2, y, x, y);
    }
  }
  ctx.lineTo(pL + cW, pT + cH);
  ctx.closePath();
  const gr = ctx.createLinearGradient(0, pT, 0, pT + cH);
  gr.addColorStop(0, 'rgba(60,198,83,0.2)');
  gr.addColorStop(1, 'rgba(60,198,83,0.01)');
  ctx.fillStyle = gr;
  ctx.fill();

  // Line
  ctx.beginPath();
  for (let i = 0; i < months; i++) {
    const x = pL + (cW / (months - 1)) * i;
    const y = pT + cH - (data[i] / max) * cH;
    if (i === 0) ctx.moveTo(x, y);
    else {
      const px = pL + (cW / (months - 1)) * (i - 1);
      const py = pT + cH - (data[i - 1] / max) * cH;
      ctx.bezierCurveTo((px + x) / 2, py, (px + x) / 2, y, x, y);
    }
  }
  ctx.strokeStyle = '#3cc653';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // Dots
  for (let i = 0; i < months; i++) {
    const x = pL + (cW / (months - 1)) * i;
    const y = pT + cH - (data[i] / max) * cH;
    ctx.beginPath(); ctx.arc(x, y, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = '#3cc653'; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
  }

  // End label
  const lx = pL + cW;
  const ly = pT + cH - (data[months - 1] / max) * cH;
  ctx.fillStyle = '#1b1b1b'; ctx.font = 'bold 12px Inter, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(fmt(data[months - 1]) + ' ₸', lx, ly - 12);
}

// ===== INIT =====
applyTranslations();
buildFaq();
updateCalc();
window.addEventListener('resize', drawChart);
</script>
